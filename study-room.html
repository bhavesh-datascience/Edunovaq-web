<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edunovaq - Active Study Room</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="https://meet.jit.si/external_api.js"></script>
</head>
<body>
    <nav class="sidebar glass-style">
        <div class="brand">
            <div class="icon-container"><i class="fa-solid fa-plus-circle"></i></div>
            <span class="nav-text brand-text">Edunovaq</span>
        </div>
        <ul class="nav-list">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><div class="icon-container"><i class="fa-solid fa-house"></i></div><span class="nav-text">Dashboard</span></a></li>
            <li class="nav-item"><a href="focus.html" class="nav-link"><div class="icon-container"><i class="fa-solid fa-bullseye"></i></div><span class="nav-text">Focus</span></a></li>
            <li class="nav-item"><a href="ai-tools.html" class="nav-link"><div class="icon-container"><i class="fa-solid fa-robot"></i></div><span class="nav-text">AI Tools</span></a></li>
            <li class="nav-item"><a href="group-study.html" class="nav-link active"><div class="icon-container"><i class="fa-solid fa-users"></i></div><span class="nav-text">Group Study</span></a></li>
            <li class="nav-item"><a href="tools.html" class="nav-link"><div class="icon-container"><i class="fa-solid fa-toolbox"></i></div><span class="nav-text">Tools</span></a></li>
        </ul>
        <ul class="nav-list bottom-menu">
            <li class="nav-item"><a href="settings.html" class="nav-link"><div class="icon-container"><i class="fa-solid fa-gear"></i></div><span class="nav-text">Settings</span></a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><div class="icon-container"><i class="fa-solid fa-right-from-bracket"></i></div><span class="nav-text">Logout</span></a></li>
        </ul>
    </nav>

    <main class="main-container">
        <header class="top-header">
            <div class="search-bar glass-style"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search rooms..."></div>
            <div class="header-actions">
                <i class="fa-regular fa-bell" style="font-size: 20px;"></i>
                <div class="user-profile glass-style">
                    <div id="profile-img-placeholder" style="width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; border: 1px solid rgba(255,255,255,0.4);">
                        U
                    </div>
                    <span id="profile-name-display">Loading...</span>
                </div>
                <i class="fa-solid fa-arrow-right-from-bracket" id="logout-icon" style="font-size: 20px; cursor: pointer; color: rgba(255,255,255,0.7);" title="Logout"></i>
            </div>
        </header>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 class="page-title">Active Study Room</h1>
            <button onclick="leaveRoom()" style="padding: 10px 20px; background: rgba(239, 68, 68, 0.8); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;" class="glass-style">
                <i class="fa-solid fa-phone-slash"></i> Leave Room
            </button>
        </div>

        <div id="jitsi-container" class="glass-style" style="width: 100%; height: 70vh; border-radius: 15px; overflow: hidden; margin-top: 15px; border: 1px solid rgba(255,255,255,0.2);"></div>
        
    </main>

    <script src="dashboard-script.js"></script>

    <script>
        let api; // Make api globally accessible for the leaveRoom function

        window.onload = () => {
            // Retrieve data passed from group-study.html
            const roomName = localStorage.getItem("currentStudyRoom");
            const userName = localStorage.getItem("studyRoomUser");

            // Redirect back if accessed directly without creating a room
            if (!roomName) {
                window.location.href = "group-study.html";
                return;
            }

            const domain = "meet.jit.si";
            const options = {
                roomName: roomName,
                width: "100%",
                height: "100%",
                parentNode: document.getElementById("jitsi-container"),
                userInfo: {
                    displayName: userName // Automatically sets the username
                },
                configOverwrite: {
                    prejoinPageEnabled: false, // Skips lobby
                    startWithAudioMuted: true,
                    startWithVideoMuted: true
                },
                interfaceConfigOverwrite: {
                    SHOW_CHROME_EXTENSION_BANNER: false
                }
            };

            api = new JitsiMeetExternalAPI(domain, options);

            // Listen for the user hanging up via the Jitsi interface
            api.addEventListener('videoConferenceLeft', () => {
                leaveRoom();
            });
        };

        // Function to clean up and redirect when leaving the room
        function leaveRoom() {
            if (api) {
                api.dispose(); // Destroys the iframe
            }
            // Clear temporary data
            localStorage.removeItem("currentStudyRoom");
            localStorage.removeItem("studyRoomUser");
            // Redirect back to group study hub
            window.location.href = "group-study.html";
        }
    </script>
</body>
</html>
