        function leaveRoom() {
            if (api) {

            if (document.fullscreenElement) {
                document.exitFullscreen().catch(err => console.log(err));

            localStorage.removeItem("studyRoomUser");

        }

        // --- FULLSCREEN LOGIC ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Your browser blocked full-screen: ${err.message}`);
                });
                document.getElementById('fullscreen-btn').innerText = "🗗 Exit Fullscreen";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.getElementById('fullscreen-btn').innerText = "⛶ Enter Fullscreen";
