<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edunovaq - Group Study</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
</head>
<body>
    <nav class="sidebar glass-style">
        <div class="brand">
            <div class="icon-container"><i class="fa-solid fa-plus-circle"></i></div>
            <span class="nav-text brand-text">Edunovaq</span>
        </div>
        <ul class="nav-list">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><div class="icon-container"><i class="fa-solid fa-house"></i></div><span class="nav-text">Dashboard</span></a></li>
            <li class="nav-item"><a href="focus.html" class="nav-link"><div class="icon-container"><i class="fa-solid fa-bullseye"></i></div><span class="nav-text">Focus</span></a></li>
            <li class="nav-item"><a href="ai-tools.html" class="nav-link"><div class="icon-container"><i class="fa-solid fa-robot"></i></div><span class="nav-text">AI Tools</span></a></li>
            <li class="nav-item"><a href="group-study.html" class="nav-link active"><div class="icon-container"><i class="fa-solid fa-users"></i></div><span class="nav-text">Group Study</span></a></li>
            <li class="nav-item"><a href="tools.html" class="nav-link"><div class="icon-container"><i class="fa-solid fa-toolbox"></i></div><span class="nav-text">Tools</span></a></li>
        </ul>
        <ul class="nav-list bottom-menu">
            <li class="nav-item"><a href="settings.html" class="nav-link"><div class="icon-container"><i class="fa-solid fa-gear"></i></div><span class="nav-text">Settings</span></a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><div class="icon-container"><i class="fa-solid fa-right-from-bracket"></i></div><span class="nav-text">Logout</span></a></li>
        </ul>
    </nav>

    <main class="main-container">
      <header class="top-header" style="justify-content: flex-end; width: 100%;">
            <div class="header-actions" style="display: flex; align-items: center; gap: 20px;">
                <i class="fa-regular fa-bell" style="font-size: 20px; cursor: pointer;"></i>
                
                <div class="user-profile glass-style">
                    <div id="profile-img-placeholder" style="width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; border: 1px solid rgba(255,255,255,0.4);">
                        U
                    </div>
                    <span id="profile-name-display">Loading...</span>
                </div>
                
                <i class="fa-solid fa-arrow-right-from-bracket" id="logout-icon" style="font-size: 20px; cursor: pointer; color: rgba(255,255,255,0.7);" title="Logout" onmouseover="this.style.color='#ff4757'" onmouseout="this.style.color='rgba(255,255,255,0.7)'"></i>
            </div>
        </header>
        <h1 class="page-title">Group Study</h1>

        <div class="tools-grid">
            <div class="study-card glass-style">
                <div class="icon-wrapper"><i class="fa-solid fa-globe"></i></div>
                <h2>Public Rooms</h2>
                <p>Study with students worldwide.</p>
                <button class="card-btn" id="public-room-btn">Join Room</button>
            </div>
            <div class="study-card glass-style">
                <div class="icon-wrapper"><i class="fa-solid fa-lock"></i></div>
                <h2>Private Circle</h2>
                <p>Invite friends and study together.</p>
                <button class="card-btn" id="private-circle-btn">Create Room</button>
            </div>
        </div>
    </main>

    <script src="dashboard-script.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const privateCircleBtn = document.getElementById("private-circle-btn");
            const publicRoomBtn = document.getElementById("public-room-btn");
            const profileNameDisplay = document.getElementById("profile-name-display");

            // Helper function to grab the user's name silently
            function getUserName() {
                let userName = localStorage.getItem("username") || profileNameDisplay.innerText;
                if (!userName || userName === "Loading..." || userName === "U") {
                    userName = "Edunovaq Student";
                }
                return userName;
            }

            // Logic for Private Circle (Creates a random room)
            privateCircleBtn.addEventListener("click", () => {
                const userName = getUserName();
                const roomName = "EdunovaqPrivateCircle_" + Math.random().toString(36).substring(7);

                localStorage.setItem("currentStudyRoom", roomName);
                localStorage.setItem("studyRoomUser", userName);
                window.location.href = "study-room.html";
            });

            // Logic for Public Rooms (Prompts for a room name or uses default)
            publicRoomBtn.addEventListener("click", () => {
                const userName = getUserName();
                
                // Ask the user what room they want to join, providing a default lobby
                const roomInput = prompt("Enter the public room name to join:", "EdunovaqGlobalLobby");
                
                // If they clicked "OK" and didn't leave it completely blank
                if (roomInput !== null && roomInput.trim() !== "") {
                    // Remove spaces to make it a valid Jitsi room URL
                    const formattedRoomName = roomInput.trim().replace(/\s+/g, '');
                    
                    localStorage.setItem("currentStudyRoom", formattedRoomName);
                    localStorage.setItem("studyRoomUser", userName);
                    window.location.href = "study-room.html";
                }
            });
        });
    </script>
</body>
</html>
